<style>

    /* ===========================
   CATEGORY MANAGEMENT
=========================== */

.content{
    background:#fff;
    border-radius:12px;
    padding:25px;
    box-shadow:0 5px 18px rgba(0,0,0,.08);
}

.section-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    flex-wrap:wrap;
    gap:15px;
}

.header-actions{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

.header-actions input{
    width:280px;
}

.product-form{
    margin-top:25px;
}

.form-row{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
    margin-bottom:20px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group label{
    font-weight:600;
    margin-bottom:8px;
    color:#444;
}

.form-group input,
.form-group select,
.form-group textarea{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:15px;
    transition:.3s;
    outline:none;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{
    border-color:#cd104d;
    box-shadow:0 0 0 3px rgba(133,39,71,.15);
}

textarea{
    resize:vertical;
}

.checkbox-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:15px;
}

.checkbox-grid label{
    display:flex;
    align-items:center;
    gap:8px;
    cursor:pointer;
}

.image-preview{
    margin-top:20px;
    display:flex;
    flex-wrap:wrap;
    gap:15px;
}

.image-preview img{
    width:140px;
    height:140px;
    object-fit:cover;
    border-radius:10px;
    border:1px solid #ddd;
}

.form-buttons{
    display:flex;
    gap:15px;
    margin-top:25px;
    flex-wrap:wrap;
}

.btn-primary{
    background:#cd104d;
    color:#fff;
    border:none;
    padding:12px 24px;
    border-radius:8px;
    cursor:pointer;
    transition:.3s;
}

.btn-primary:hover{
    background:#6d1f39;
}

.btn-gold{
    background:#c69b3d;
    color:#fff;
    border:none;
    padding:12px 24px;
    border-radius:8px;
    cursor:pointer;
}

.btn{
    padding:12px 24px;
    border:1px solid #ccc;
    background:#fff;
    border-radius:8px;
    cursor:pointer;
}

.table-box{
    margin-top:35px;
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
}

table th{
    background:#cd104d;
    color:#fff;
    padding:14px;
    text-align:left;
}

table td{
    padding:14px;
    border-bottom:1px solid #eee;
}

table img{
    width:70px;
    height:70px;
    object-fit:cover;
    border-radius:8px;
}

.edit-btn{
    background:#2e7d32;
    color:#fff;
    border:none;
    padding:8px 14px;
    border-radius:6px;
    cursor:pointer;
    margin-right:8px;
}

.delete-btn{
    background:#d32f2f;
    color:#fff;
    border:none;
    padding:8px 14px;
    border-radius:6px;
    cursor:pointer;
}

.edit-btn:hover{
    background:#1b5e20;
}

.delete-btn:hover{
    background:#b71c1c;
}

hr{
    margin:30px 0;
    border:none;
    border-top:1px solid #eee;
}

@media(max-width:768px){

.form-row{
grid-template-columns:1fr;
}

.section-header{
flex-direction:column;
align-items:flex-start;
}

.header-actions{
width:100%;
}

.header-actions input{
width:100%;
}

.form-buttons{
flex-direction:column;
}

.form-buttons button{
width:100%;
}

.checkbox-grid{
grid-template-columns:1fr;
}

}

</style>

<section class="content">

<div class="section-header">

<h2>Category Management</h2>

<div class="header-actions">

<input
type="text"
id="searchCategory"
placeholder="Search Category...">

<button
type="button"
class="btn-primary"
id="showCategoryForm">

+ Add Category

</button>

</div>

</div>

<form
id="categoryForm"
class="product-form"
style="display:none;">

<h3>General Information</h3>

<div class="form-row">

<div class="form-group">

<label>Category Name *</label>

<input
type="text"
id="categoryName"
required>

</div>

<div class="form-group">

<label>Slug</label>

<input
type="text"
id="categorySlug"
placeholder="pakistani-collection">

</div>

</div>

<div class="form-row">

<div class="form-group">

<label>Parent Category</label>

<select id="parentCategory">

<option value="">None</option>

</select>

</div>

<div class="form-group">

<label>Status</label>

<select id="categoryStatus">

<option value="Active">Active</option>

<option value="Inactive">Inactive</option>

</select>

</div>

</div>

<div class="form-group">

<label>Description</label>

<textarea
id="categoryDescription"
rows="5"></textarea>

</div>

<hr>

<h3>Category Image</h3>

<div class="form-row">

    <div class="form-group">

        <label>Category Image</label>

        <input
            type="file"
            id="categoryImage"
            accept=".jpg,.jpeg,.png,.webp">

    </div>

    <div class="form-group">

        <label>Display Order</label>

        <input
            type="number"
            id="displayOrder"
            value="1">

    </div>

</div>

<div
    class="image-preview"
    id="categoryPreview">

</div>

<hr>

<h3>Homepage Settings</h3>

<div class="checkbox-grid">

    <label>

        <input
            type="checkbox"
            id="showHome"
            checked>

        Show On Homepage

    </label>

    <label>

        <input
            type="checkbox"
            id="featuredCategory">

        Featured Category

    </label>

</div>

<hr>

<div class="form-buttons">

    <button
        type="button"
        class="btn-primary"
        id="saveCategory">

        Save Category

    </button>

    <button
        type="button"
        class="btn-gold"
        id="updateCategory"
        style="display:none;">

        Update Category

    </button>

    <button
        type="reset"
        class="btn">

        Reset

    </button>

</div>

</form>

<div class="table-box">

    <table>

        <thead>

            <tr>

                <th>Image</th>

                <th>Name</th>

                <th>Slug</th>

                <th>Parent</th>

                <th>Status</th>

                <th>Home</th>

                <th>Action</th>

            </tr>

        </thead>

        <tbody id="categoryTable">

        </tbody>

    </table>

</div>

</section>

<script type="module" src="assets/js/categories.js"></script>
