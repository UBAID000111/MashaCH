<style>

    /* ===========================
   PRODUCT MANAGEMENT
=========================== */

.content{

    background:#fff;

    border-radius:12px;

    padding:25px;

    box-shadow:0 5px 20px rgba(0,0,0,.08);

}

.size-stock-grid{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:15px;

margin-top:20px;

}

.size-stock-item{

display:flex;

justify-content:space-between;

align-items:center;

padding:12px;

border:1px solid #ddd;

border-radius:10px;

background:#fff;

}

.size-stock-item label{

display:flex;

align-items:center;

gap:8px;

font-weight:600;

}

.sizeStock{

width:90px;

padding:8px;

border:1px solid #ccc;

border-radius:8px;

text-align:center;

}

@media(max-width:768px){

.size-stock-grid{

grid-template-columns:1fr;

}

}

.section-header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:25px;

    flex-wrap:wrap;

    gap:15px;

}

.header-actions{

    display:flex;

    gap:12px;

    flex-wrap:wrap;

}

.header-actions input{

    width:260px;

}

/* ===========================
   FORM
=========================== */

.product-form{

    margin-top:25px;

}

.form-row{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:20px;

    margin-bottom:20px;

}

.form-group{

    display:flex;

    flex-direction:column;

}

.form-group label{

    margin-bottom:8px;

    font-weight:600;

    color:#444;

}

.form-group input,

.form-group select,

.form-group textarea{

    padding:12px;

    border:1px solid #ddd;

    border-radius:8px;

    font-size:15px;

    outline:none;

    transition:.3s;

}

.form-group input:focus,

.form-group select:focus,

.form-group textarea:focus{

    border-color:#cd104d;

    box-shadow:0 0 0 3px rgba(133,39,71,.15);

}

textarea{

    resize:vertical;

}

hr{

    margin:30px 0;

    border:none;

    border-top:1px solid #eee;

}

/* ===========================
   CHECKBOXES
=========================== */

.checkbox-grid{

    display:grid;

    grid-template-columns:repeat(auto-fill,minmax(120px,1fr));

    gap:12px;

}

.checkbox-grid label{

    display:flex;

    align-items:center;

    gap:8px;

    cursor:pointer;

}

/* ===========================
   VARIANTS
=========================== */

.variant-card{

    background:#fafafa;

    border:1px solid #ddd;

    border-radius:12px;

    padding:25px;

    margin:25px 0;

    box-shadow:0 3px 12px rgba(0,0,0,.06);

}

.variant-header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:20px;

}

.variant-header h4{

    color:#b09246;

    margin:0;

}

.variant-grid{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:20px;

}

.variantPreview{

    display:flex;

    flex-wrap:wrap;

    gap:10px;

    margin-top:15px;

}

.variantPreview img{

    width:90px;

    height:110px;

    object-fit:cover;

    border-radius:8px;

    border:1px solid #ddd;

}

.remove-variant{

    background:#d32f2f;

    color:#fff;

    border:none;

    border-radius:6px;

    padding:10px 18px;

    cursor:pointer;

    transition:.3s;

}

.remove-variant:hover{

    background:#b71c1c;

}

/* ===========================
   BUTTONS
=========================== */

.btn-primary{

    background:#cd104d;

    color:#fff;

    border:none;

    padding:12px 20px;

    border-radius:8px;

    cursor:pointer;

    transition:.3s;

}

.btn-primary:hover{

    background:#705b26;

}

.btn-gold{

    background:#daa22b;

    color:#fff;

    border:none;

    padding:12px 20px;

    border-radius:8px;

    cursor:pointer;

}

.btn{

    padding:12px 20px;

    border:1px solid #ccc;

    background:#fff;

    border-radius:8px;

    cursor:pointer;

}

.form-buttons{

    display:flex;

    gap:15px;

    flex-wrap:wrap;

    margin-top:25px;

}

/* ===========================
   TABLE
=========================== */

.table-box{

    margin-top:35px;

    overflow:auto;

}

table{

    width:100%;

    border-collapse:collapse;

    background:#fff;

}

table th{

    background:#cd104d;

    color:#fff;

    padding:14px;

    text-align:left;

}

table td{

    padding:14px;

    border-bottom:1px solid #eee;

}

table img{

    width:70px;

    height:85px;

    object-fit:cover;

    border-radius:8px;

}

.edit-btn{

    background:#2e7d32;

    color:#fff;

    border:none;

    padding:8px 14px;

    border-radius:6px;

    cursor:pointer;

    margin-right:8px;

}

.delete-btn{

    background:#d32f2f;

    color:#fff;

    border:none;

    padding:8px 14px;

    border-radius:6px;

    cursor:pointer;

}

/* ===========================
   MOBILE
=========================== */

@media(max-width:768px){

    

.form-row{

grid-template-columns:1fr;

}

.variant-grid{

grid-template-columns:1fr;

}

.section-header{

flex-direction:column;

align-items:flex-start;

}

.header-actions{

width:100%;

}

.header-actions input{

width:100%;

}

.form-buttons{

flex-direction:column;

}

.form-buttons button{

width:100%;

}

}
</style>

<section class="content">

    <div class="section-header">

        <h2>Product Management</h2>

        <div class="header-actions">

            <input
                type="text"
                id="searchProduct"
                placeholder="Search Product...">

            <button
                type="button"
                class="btn-primary"
                id="showProductForm">

                + Add Product

            </button>

        </div>

    </div>

    <form
        id="productForm"
        class="product-form"
        style="display:none;">

        <h3>General Information</h3>

        <div class="form-row">

            <div class="form-group">

                <label>Product Name *</label>

                <input
                    type="text"
                    id="productName"
                    required>

            </div>

            <div class="form-group">

                <label>Slug</label>

                <input
                    type="text"
                    id="productSlug"
                    placeholder="pakistani-suit">

            </div>

        </div>

        <div class="form-row">

            <div class="form-group">

                <label>Category *</label>

                <select id="productCategory">

                    <option value="">
                        Select Category
                    </option>

                </select>

            </div>

            <div class="form-group">

                <label>Status</label>

                <select id="productStatus">

                    <option value="Active">
                        Active
                    </option>

                    <option value="Inactive">
                        Inactive
                    </option>

                    <option value="Out Of Stock">
                        Out Of Stock
                    </option>

                </select>

            </div>

        </div>

        <div class="form-group">

            <label>Description</label>

            <textarea
                id="productDescription"
                rows="6"></textarea>

        </div>

        <hr>

        <h3>Homepage Settings</h3>

        <div class="checkbox-grid">

            <label>

                <input
                    type="checkbox"
                    id="featured">

                Featured Product

            </label>

            <label>

                <input
                    type="checkbox"
                    id="newArrival">

                New Arrival

            </label>

            <label>

                <input
                    type="checkbox"
                    id="onSale">

                On Sale

            </label>

            <label>

                <input
                    type="checkbox"
                    id="trending">

                Trending

            </label>

            <label>

                <input
                    type="checkbox"
                    id="showHome"
                    checked>

                Show On Homepage

            </label>

        </div>

        <hr>

        <h3>SEO</h3>

        <div class="form-group">

            <label>Meta Title</label>

            <input
                type="text"
                id="metaTitle">

        </div>

        <div class="form-group">

            <label>Meta Description</label>

            <textarea
                id="metaDescription"
                rows="4"></textarea>

        </div>

        <hr>

        <h3>Product Variants</h3>

<div id="variantsContainer"></div>


    <template id="variantTemplate">

<div class="variant-card">

<div class="variant-header">

<h4 class="variant-title">

Variant

</h4>

<button
type="button"
class="remove-variant">

Remove

</button>

</div>

<div class="variant-grid">

<div class="form-group">

<label>Color Name *</label>

<input
type="text"
class="variantColor"
placeholder="Black">

</div>

<div class="form-group">

<label>Color Picker</label>

<input
type="color"
class="variantHex"
value="#000000">

</div>

<div class="form-group">

<label>Price *</label>

<input
type="number"
class="variantPrice"
placeholder="1999">

</div>

<div class="form-group">

<label>Old Price</label>

<input
type="number"
class="variantOldPrice"
placeholder="2499">

</div>



<div class="form-group">

<label>SKU</label>

<input
type="text"
class="variantSku"
placeholder="PK001-BLK">

</div>

</div>

<hr>

<h4>Available Sizes & Stock</h4>

<div class="size-stock-grid">

<div class="size-stock-item">
<label><input type="checkbox" class="variantSize" value="Free Size"> Free Size</label>
<input type="number" class="sizeStock" data-size="Free Size" placeholder="Stock">
</div>

<div class="size-stock-item">
<label><input type="checkbox" class="variantSize" value="XS"> XS</label>
<input type="number" class="sizeStock" data-size="XS" placeholder="Stock">
</div>

<div class="size-stock-item">
<label><input type="checkbox" class="variantSize" value="S"> S</label>
<input type="number" class="sizeStock" data-size="S" placeholder="Stock">
</div>

<div class="size-stock-item">
<label><input type="checkbox" class="variantSize" value="M"> M</label>
<input type="number" class="sizeStock" data-size="M" placeholder="Stock">
</div>

<div class="size-stock-item">
<label><input type="checkbox" class="variantSize" value="L"> L</label>
<input type="number" class="sizeStock" data-size="L" placeholder="Stock">
</div>

<div class="size-stock-item">
<label><input type="checkbox" class="variantSize" value="XL"> XL</label>
<input type="number" class="sizeStock" data-size="XL" placeholder="Stock">
</div>

<div class="size-stock-item">
<label><input type="checkbox" class="variantSize" value="XXL"> XXL</label>
<input type="number" class="sizeStock" data-size="XXL" placeholder="Stock">
</div>

<div class="size-stock-item">
<label><input type="checkbox" class="variantSize" value="3XL"> 3XL</label>
<input type="number" class="sizeStock" data-size="3XL" placeholder="Stock">
</div>

<div class="size-stock-item">
<label><input type="checkbox" class="variantSize" value="4XL"> 4XL</label>
<input type="number" class="sizeStock" data-size="4XL" placeholder="Stock">
</div>

<div class="size-stock-item">
<label><input type="checkbox" class="variantSize" value="5XL"> 5XL</label>
<input type="number" class="sizeStock" data-size="5XL" placeholder="Stock">
</div>

<hr>

<div class="variant-grid">

<div class="form-group">

<label>Main Image *</label>

<input
type="file"
class="variantImage"
accept="image/*">

</div>

<div class="form-group">

<label>Gallery Images</label>

<input
type="file"
class="variantGallery"
accept="image/*"
multiple>

</div>

</div>

<div class="variantPreview"></div>

</div>

</template>



<hr>

<button
type="button"
class="btn-primary"
id="addVariant">

+ Add Variant

</button>

<hr>

<div class="form-buttons">

    <button
        type="button"
        class="btn-primary"
        id="saveProduct">

        Save Product

    </button>

    <button
        type="button"
        class="btn-gold"
        id="updateProduct"
        style="display:none;">

        Update Product

    </button>

    <button
        type="reset"
        class="btn">

        Reset

    </button>

</div>

</form>

</section>

<div class="table-box">

<table>

<thead>

<tr>

<th>Image</th>

<th>Name</th>

<th>Category</th>

<th>Price</th>

<th>Stock</th>

<th>Status</th>

<th>Featured</th>

<th>Action</th>

</tr>

</thead>

<tbody id="productTable">

</tbody>

</table>

</div>
