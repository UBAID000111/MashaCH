<section class="content">

    <div class="section-header">

        <h2>Product Management</h2>

        <div class="header-actions">

            <input
                type="text"
                id="searchProduct"
                placeholder="Search Product..."
            >

            <button
                class="btn-primary"
                id="showProductForm">

                + Add Product

            </button>

        </div>

    </div>

    <div
        class="product-form"
        id="productForm"
        style="display:none;">

        <h3>General Information</h3>

        <div class="form-row">

            <div class="form-group">

                <label>Product Name *</label>

                <input
                    type="text"
                    id="productName"
                >

            </div>

            <div class="form-group">

                <label>Slug</label>

                <input
                    type="text"
                    id="productSlug"
                    placeholder="pakistani-suit-01"
                >

            </div>

        </div>

        <div class="form-row">

            <div class="form-group">

                <label>Category *</label>

                <select id="productCategory">

                    <option value="">
                        Select Category
                    </option>

                </select>

            </div>

            <div class="form-group">

                <label>Status</label>

                <select id="productStatus">

                    <option value="Active">
                        Active
                    </option>

                    <option value="Inactive">
                        Inactive
                    </option>

                    <option value="Out Of Stock">
                        Out Of Stock
                    </option>

                </select>

            </div>

        </div>

        <div class="form-group">

            <label>Description</label>

            <textarea
                id="productDescription"
                rows="5">
            </textarea>

        </div>

        <hr>

        <h3>Pricing</h3>

        <div class="form-row">

            <div class="form-group">

                <label>Current Price *</label>

                <input
                    type="number"
                    id="productPrice"
                >

            </div>

            <div class="form-group">

                <label>Old Price</label>

                <input
                    type="number"
                    id="oldPrice"
                >

            </div>

        </div>

        <div class="form-row">

            <div class="form-group">

                <label>Discount %</label>

                <input
                    type="number"
                    id="discount"
                >

            </div>

            <div class="form-group">

                <label>Stock</label>

                <input
                    type="number"
                    id="stock"
                >

            </div>

        </div>

        <div class="form-group">

            <label>SKU</label>

            <input
                type="text"
                id="sku"
            >

        </div>

        <hr>

        <h3>Variants</h3>

        <div class="form-row">

            <div class="form-group">

                <label>Available Sizes</label>

                <div class="checkbox-grid">

                    <label><input type="checkbox" value="XS"> XS</label>

                    <label><input type="checkbox" value="S"> S</label>

                    <label><input type="checkbox" value="M"> M</label>

                    <label><input type="checkbox" value="L"> L</label>

                    <label><input type="checkbox" value="XL"> XL</label>

                    <label><input type="checkbox" value="XXL"> XXL</label>
                    
                    <label><input type="checkbox" value="3XL"> 3XL</label>

                    <label><input type="checkbox" value="4XL"> 4XL</label>

                    <label><input type="checkbox" value="5XL"> 5XL</label>

                </div>

            </div>

            <div class="form-group">

                <label>Available Colors</label>

                <input
                    type="text"
                    id="colors"
                    placeholder="Black, White, Red"
                >

            </div>

        </div>

                <hr>

        <h3>Product Images</h3>

        <div class="form-row">

            <div class="form-group">

                <label>Main Image</label>

                <input
                    type="file"
                    id="mainImage"
                    accept=".jpg,.jpeg,.png,.webp"
                >

            </div>

            <div class="form-group">

                <label>Gallery Images</label>

                <input
                    type="file"
                    id="galleryImages"
                    accept=".jpg,.jpeg,.png,.webp"
                    multiple
                >

            </div>

        </div>

        <div class="image-preview" id="imagePreview">

        </div>

        <hr>

        <h3>Homepage Settings</h3>

        <div class="checkbox-grid">

            <label>

                <input
                    type="checkbox"
                    id="featured"
                >

                Featured Product

            </label>

            <label>

                <input
                    type="checkbox"
                    id="newArrival"
                >

                New Arrival

            </label>

            <label>

                <input
                    type="checkbox"
                    id="onSale"
                >

                On Sale

            </label>

            <label>

                <input
                    type="checkbox"
                    id="trending"
                >

                Trending

            </label>

            <label>

                <input
                    type="checkbox"
                    id="showHome"
                    checked
                >

                Show On Homepage

            </label>

        </div>

        <hr>

        <h3>SEO</h3>

        <div class="form-group">

            <label>Meta Title</label>

            <input
                type="text"
                id="metaTitle"
            >

        </div>

        <div class="form-group">

            <label>Meta Description</label>

            <textarea
                id="metaDescription"
                rows="4">
            </textarea>

        </div>

        <br>

        <div class="form-buttons">

            <button
                class="btn-primary"
                id="saveProduct">

                Save Product

            </button>

            <button
                class="btn-gold"
                id="updateProduct"
                style="display:none;">

                Update Product

            </button>

            <button
                class="btn"
                type="reset">

                Reset

            </button>

        </div>

    </div>

</section>

<div class="table-box">

    <table>

        <thead>

            <tr>

                <th>Image</th>

                <th>Name</th>

                <th>Category</th>

                <th>Price</th>

                <th>Stock</th>

                <th>Status</th>

                <th>Featured</th>

                <th>Action</th>

            </tr>

        </thead>

        <tbody id="productTable">

        </tbody>

    </table>

</div>
