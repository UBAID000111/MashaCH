<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>My Orders | Masha™</title>

<link rel="stylesheet"
href="assets/css/orders.css">

<link rel="icon" type="image/jpeg" href="/assets/images/logoff-removebg-preview.png">

<link rel="stylesheet"
href="assets/css/navbar.css">

<link rel="stylesheet"
href="assets/css/footer.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<!-- Navbar -->
<div id="navbar"></div>

<section class="orders-page">

<div class="orders-header">

<div>

<h1>My Orders</h1>

<p>
Track your purchases and payment history.
</p>

</div>

<div class="orders-search">

<i class="fa fa-search"></i>

<input
type="text"
id="searchOrder"
placeholder="Search Order...">

</div>

</div>

<!-- Loading -->

<div
id="ordersLoading"
class="orders-loading">

<div class="loader"></div>

<p>Loading Orders...</p>

</div>

<!-- Empty -->

<div
id="emptyOrders"
class="empty-orders"
style="display:none;">

<img
src="assets/images/empty-order.svg"
alt="">

<h2>No Orders Yet</h2>

<p>

Looks like you haven't placed any orders yet.

</p>

<a href="shop.html">

Start Shopping

</a>

</div>

<!-- Orders -->

<div
id="ordersContainer"
class="orders-container">

<!-- JS -->

</div>

</section>

<!-- Footer -->

<div id="footer"></div>

<script type="module"
src="assets/js/orders.js"></script>

</body>

</html>
