<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout | Masha™</title>
<link rel="stylesheet" href="/assets/css/backBtn.css">
<link rel="icon" type="image/jpeg" href="/assets/images/logoff-removebg-preview.png">
<link rel="stylesheet" href="assets/css/navbar.css">
<link rel="stylesheet" href="assets/css/footer.css">
<link rel="stylesheet" href="assets/css/checkout.css">
<link rel="stylesheet" href="assets/css/responsive.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

            <div class="page-back">

<a href="index.html" class="back-btn">

<svg xmlns="http://www.w3.org/2000/svg"
width="18"
height="18"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="2">

<path d="M15 18l-6-6 6-6"/>

</svg>

<span>Back</span>

</a>

</div>

<section class="checkout-page">

<h1>Checkout</h1>

<div class="checkout-grid">

<!-- LEFT -->

<div class="checkout-left">

<div class="section-card">

<div class="section-header">

<h2>Delivery Address</h2>

<button id="addAddressBtn">

+ Add New Address

</button>

</div>

<div id="addressList">

<div class="empty-address">

📍

<h3>No Saved Address</h3>

<p>Add your first delivery address.</p>

</div>

</div>

</div>

</div>


<div class="coupon-section">

<h3>Apply Coupon</h3>

<div class="coupon-input">

<input
type="text"
id="couponInput"
placeholder="Enter coupon code (e.g. WELCOME10)">

<button id="applyCouponBtn">

Apply

</button>

</div>

<div id="couponMessage"></div>

</div>

<!-- RIGHT -->

<div class="checkout-right">

<div class="summary-card">

<h2>Order Summary</h2>

<div id="checkoutItems">

</div>

<hr>

<div class="summary-row">

<span>Subtotal</span>

<span id="subtotal">₹0</span>

</div>

<div class="summary-row">

<span>Discount</span>

<span id="discountAmount">

-₹0

</span>

</div>

<div class="summary-row total">

<span>Total</span>

<span id="total">₹0</span>

</div>

<button id="continueBtn"
class="continue-payment">

Continue To Payment

</button>

</div>

</div>

</div>

</section>

<!-- ADDRESS MODAL -->

<div id="addressModal" class="address-modal">

<div class="address-box">

<button id="closeAddress">

&times;

</button>

<h2 id="modalTitle">Add Address</h2>

<form id="addressForm">

<input
id="fullName"
placeholder="Full Name"
required>

<input
id="phone"
placeholder="Mobile Number"
required>

<input
id="pincode"
placeholder="Pincode"
required>

<input
id="house"
placeholder="House / Flat / Building"
required>

<input
id="area"
placeholder="Area / Street"
required>

<input
id="landmark"
placeholder="Landmark">

<input
id="city"
placeholder="City"
required>

<input
id="state"
placeholder="State"
required>

<input
id="country"
placeholder="Country"
value="India">

<select id="addressType">

<option>Home</option>

<option>Office</option>

<option>Other</option>

</select>

<label class="default-check">

<input
type="checkbox"
id="defaultAddress">

Set as Default Address

</label>

<button type="submit">

Save Address

</button>

</form>

</div>

</div>

<script type="module" src="assets/js/checkout.js"></script>

</body>

</html>
