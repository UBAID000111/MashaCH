<style>

    body{

margin:0;

font-family:Poppins,sans-serif;

background:#faf8f8;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

}

.complete-box{

width:380px;

background:#fff;

padding:35px;

border-radius:22px;

box-shadow:0 15px 40px rgba(0,0,0,.08);

text-align:center;

}

.complete-box h2{

margin-bottom:12px;

font-size:28px;

}

.complete-box p{

color:#777;

margin-bottom:25px;

}

.complete-box input{

width:100%;

height:54px;

border:1px solid #ddd;

border-radius:14px;

padding:0 15px;

font-size:16px;

box-sizing:border-box;

margin-bottom:20px;

}

.complete-box button{

width:100%;

height:56px;

border:none;

border-radius:14px;

background:linear-gradient(135deg,#8B0F45,#C51D64);

color:#fff;

font-size:17px;

font-weight:700;

cursor:pointer;

transition:.3s;

}

.complete-box button:hover{

transform:translateY(-3px);

}

</style>

<h2>Complete Your Profile</h2>

<input
id="phone"
type="tel"
placeholder="Enter Mobile Number">

<button id="savePhone">
Continue
</button>

<script type="module" src="assets/js/complete-profile.js"></script>
