<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Media Manager</title>

<link rel="stylesheet" href="assets/css/admin-media.css">

</head>

<body>

<div class="media-container">

<h1>🎥 Media Manager</h1>

<div class="upload-box">

<input
type="text"
id="videoTitle"
placeholder="Video Title">

<input
type="file"
id="videoFile"
accept="video/*">

<button id="uploadVideo">

Upload Video

</button>

</div>

<div id="videoGrid" class="video-grid">

</div>

</div>

<script type="module" src="assets/js/admin-media.js"></script>

</body>

</html>
