<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Saved Addresses | Masha™</title>
<link rel="icon" type="image/jpeg" href="/assets/images/logoff-removebg-preview.png">
<link rel="stylesheet" href="assets/css/navbar.css">
<link rel="stylesheet" href="assets/css/footer.css">
<link rel="stylesheet" href="assets/css/address.css">
<link rel="link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<section class="address-page">

<div class="page-header">

<h1>Saved Addresses</h1>

<p>
Manage your delivery addresses.
</p>

<button id="addAddressBtn">

+ Add New Address

</button>

</div>

<div id="addressList">

<div class="empty-address">

📍

<h3>No Saved Address</h3>

<p>

Your saved addresses will appear here.

</p>

</div>

</div>

</section>

<!-- ===========================
ADD / EDIT ADDRESS MODAL
=========================== -->

<div id="addressModal" class="address-modal">

<div class="address-box">

<button id="closeAddress">

&times;

</button>

<h2 id="modalTitle">

Add Address

</h2>

<form id="addressForm">

<input
id="fullName"
type="text"
placeholder="Full Name"
required>

<input
id="phone"
type="tel"
placeholder="Mobile Number"
maxlength="10"
required>

<input
id="pincode"
type="text"
maxlength="6"
placeholder="Pincode"
required>

<input
id="house"
type="text"
placeholder="House / Flat / Building"
required>

<input
id="area"
type="text"
placeholder="Area / Street"
required>

<input
id="landmark"
type="text"
placeholder="Landmark (Optional)">

<div class="two-grid">

<input
id="city"
type="text"
placeholder="City"
required>

<input
id="state"
type="text"
placeholder="State"
required>

</div>

<input
id="country"
type="text"
value="India">

<select id="addressType">

<option value="Home">🏠 Home</option>

<option value="Office">🏢 Office</option>

<option value="Other">📍 Other</option>

</select>

<label class="default-check">

<input
type="checkbox"
id="defaultAddress">

Make this my default address

</label>

<button
type="submit"
class="save-btn">

Save Address

</button>


</form>

</div>

</div>

<!-- ===========================
DELETE CONFIRMATION
=========================== -->

<div id="deleteModal" class="delete-modal">

<div class="delete-box">

<h2>

Delete Address?

</h2>

<p>

This action cannot be undone.

</p>

<div class="delete-actions">

<button
id="cancelDelete">

Cancel

</button>

<button
id="confirmDelete">

Delete

</button>

</div>

</div>

</div>

<script type="module" src="assets/js/address.js"></script>

</body>

</html>
