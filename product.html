<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Product - MashaCH</title>

    <link rel="stylesheet" href="assets/css/navbar.css">
    <link rel="stylesheet" href="assets/css/product.css">
    <link rel="stylesheet" href="assets/css/responsive.css">

</head>

<body>

    <section class="product-page">

    <div class="product-gallery">

        <div class="thumbnail-images">

            <img src="https://picsum.photos/100/120">
            <img src="https://picsum.photos/100/121">
            <img src="https://picsum.photos/100/122">
            <img src="https://picsum.photos/100/123">

        </div>

        <div class="main-image">

            <img
                src="https://picsum.photos/600/800"
                id="mainProductImage"
            >

        </div>

    </div>

    <div class="product-details">

        <h1>
            Premium Oversized T-Shirt
        </h1>

        <div class="product-price">

            <span class="current-price">
                ₹999
            </span>

            <span class="old-price">
                ₹1499
            </span>

        </div>

        <p class="product-description">

            Premium cotton oversized t-shirt
            designed for comfort and style.

        </p>

        <h3>Select Size</h3>

        <div class="size-selector">

            <button>S</button>
            <button>M</button>
            <button>L</button>
            <button>XL</button>

        </div>

        <h3>Select Color</h3>

        <div class="color-selector">

            <span class="black"></span>
            <span class="white"></span>
            <span class="red"></span>

        </div>

        <div class="product-actions">

            <button class="add-cart-btn">
                Add To Cart
            </button>

            <button class="buy-now-btn">
                Buy Now
            </button>

        </div>

    </div>

</section>

</body>

</html>
