<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Promotions | Masha™</title>

<link rel="stylesheet"
href="/assets/css/promotions.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/css/all.min.css">

</head>

<body>

<div class="promotions-page">

<!-- Header -->

<div class="promo-header">

<div>

<h1>Promotions</h1>

<p>

Create coupons and automatic discounts.

</p>

</div>

<button id="newPromotionBtn">

<i class="fa-solid fa-plus"></i>

New Promotion

</button>

</div>

<!-- Analytics -->

<div class="promo-stats">

<div class="stat-card">

<h2 id="activeCount">0</h2>

<p>Active</p>

</div>

<div class="stat-card">

<h2 id="couponCount">0</h2>

<p>Coupons</p>

</div>

<div class="stat-card">

<h2 id="automaticCount">0</h2>

<p>Automatic</p>

</div>

<div class="stat-card">

<h2 id="flashCount">0</h2>

<p>Flash Sales</p>

</div>

</div>

<!-- Search -->

<div class="promo-search">

<input
type="text"
id="searchPromotion"
placeholder="Search promotion...">

</div>

<!-- Promotions -->

<div id="promotionGrid">

</div>

</div>

<!-- Modal -->

<div id="promotionModal"
class="promo-modal">

<div class="promo-box">

<button id="closePromotion">

×

</button>

<h2>Create Promotion</h2>

<div class="form-group">

<label>

Promotion Type

</label>

<select id="promotionType">

<option value="coupon">

Coupon

</option>

<option value="automatic">

Automatic Discount

</option>

<option value="flash">

Flash Sale

</option>

<option value="shipping">

Free Shipping

</option>

</select>

</div>

<div class="form-group">

<label>

Promotion Name

</label>

<input
id="promotionName">

</div>

<div class="form-group">

<label>

Coupon Code

</label>

<input
id="promotionCode">

</div>

<div class="form-group">

<label>

Discount Type

</label>

<select id="discountType">

<option value="percent">

Percentage %

</option>

<option value="fixed">

Fixed ₹

</option>

</select>

</div>

<div class="form-group">

<label>

Discount Value

</label>

<input
type="number"
id="discountValue">

</div>

<div class="form-group">

<label>

Minimum Order

</label>

<input
type="number"
id="minimumOrder">

</div>

<div class="form-group">

<label>

Maximum Discount

</label>

<input
type="number"
id="maximumDiscount">

</div>

<div class="form-group">

<label>

Usage Limit

</label>

<input
type="number"
id="usageLimit">

</div>

<div class="form-group">

<label>

Start Date

</label>

<input
type="datetime-local"
id="startDate">

</div>

<div class="form-group">

<label>

Expiry Date

</label>

<input
type="datetime-local"
id="expiryDate">

</div>

<label class="switch">

<input
type="checkbox"
id="promotionActive"
checked>

<span>

Active

</span>

</label>

<button id="savePromotion">

Save Promotion

</button>

</div>

</div>

<script type="module"
src="assets/js/promotions.js">

</script>

</body>

</html>
