<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - MashaCH</title>

    <link rel="stylesheet" href="assets/css/navbar.css">
    <link rel="stylesheet" href="assets/css/shop.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link rel="stylesheet" href="assets/css/footer.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Navbar -->
    <!-- Paste same navbar here -->

    <!-- Shop Banner -->

    <section class="shop-banner">

        <div class="shop-banner-content">

            <h1>Shop Collection</h1>

            <p>
                Discover premium clothing crafted for style and comfort.
            </p>

        </div>

    </section>

    <!-- Search -->

    <section class="search-section">

        <input
            type="text"
            placeholder="Search products..."
            id="searchInput"
        >

    </section>

    <!-- Main Shop -->

    <section class="shop-container">

        <!-- Filters -->

        <aside class="filters">

            <h3>Filters</h3>

            <div class="filter-group">

                <h4>Category</h4>

                <label><input type="checkbox"> Oversized</label>

                <label><input type="checkbox"> Men</label>

                <label><input type="checkbox"> Women</label>

                <label><input type="checkbox"> Hoodies</label>

            </div>

            <div class="filter-group">

                <h4>Size</h4>

                <label><input type="checkbox"> S</label>

                <label><input type="checkbox"> M</label>

                <label><input type="checkbox"> L</label>

                <label><input type="checkbox"> XL</label>

            </div>

            <div class="filter-group">

                <h4>Price</h4>

                <label><input type="checkbox"> ₹499 - ₹999</label>

                <label><input type="checkbox"> ₹999 - ₹1499</label>

                <label><input type="checkbox"> ₹1499+</label>

            </div>

        </aside>

        <!-- Products -->

        <div class="shop-products">

            <div class="shop-header">

                <h2>All Products</h2>

                <select>

                    <option>Newest</option>

                    <option>Price Low To High</option>

                    <option>Price High To Low</option>

                    <option>Best Selling</option>

                </select>

            </div>

            <div class="products-grid">

                <!-- Reuse same Product Card -->

            </div>

        </div>

    </section>

    <!-- Footer -->
    <!-- Paste same footer -->
     <footer class="footer">

    <div class="footer-grid">

        <div>
            <h3>MashaCH</h3>
            <p>Premium Clothing Brand.</p>
        </div>

        <div>
            <h3>Quick Links</h3>
            <a href="#">Shop</a>
            <a href="#">Track Order</a>
            <a href="#">Contact</a>
        </div>

        <div>
            <h3>Policies</h3>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms</a>
            <a href="#">Refund Policy</a>
        </div>

        <div>
            <h3>Follow Us</h3>
            <a href="#">Instagram</a>
            <a href="#">Facebook</a>
            <a href="#">WhatsApp</a>
        </div>

    </div>

</footer>

</body>

</html>
