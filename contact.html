<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Contact Us | Masha Wear</title>

<link rel="stylesheet" href="assets/css/contact.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/css/all.min.css">

</head>

<body>

<section class="contact-page">

<h1>Contact Us</h1>

<p class="subtitle">

Need help with your order? We'd love to help.

</p>

<div class="contact-card">

<div class="profile">

<img
src="assets/images/icons/mansoor hasan.jpeg"
alt="Admin">

<h2>Masha Wear Support</h2>

<p>Customer Support</p>

<div class="phone">

+91 7827407735

</div>

<div class="time">

Mon - Sat • 10:00 AM - 8:00 PM

</div>

</div>

<div class="contact-form">

<input
type="text"
id="name"
placeholder="Your Name">

<input
type="tel"
id="phone"
placeholder="Phone Number">

<textarea
id="message"
placeholder="Describe your issue..."
rows="6"></textarea>

<button id="sendBtn">

Send on WhatsApp

</button>

</div>

</div>

</section>

<script src="assets/js/contact.js"></script>

</body>

</html>
