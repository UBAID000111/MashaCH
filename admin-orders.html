<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Orders | Admin</title>

<link rel="stylesheet"
href="assets/css/admin-orders.css">

<link rel="stylesheet"
href="assets/css/admin-dashboard.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="admin-layout">

<!-- Sidebar -->

<div id="sidebar"></div>

<!-- Main -->

<div class="admin-content">

<div class="orders-header">

<div>

<h1>Orders</h1>

<p>

Manage customer orders

</p>

</div>

<div class="header-right">

<input
id="searchOrder"
type="text"
placeholder="Search Order">

</div>

</div>

<!-- Stats -->

<div class="stats-grid">

<div class="stat-card">

<h2 id="pendingCount">0</h2>

<p>Pending</p>

</div>

<div class="stat-card">

<h2 id="confirmedCount">0</h2>

<p>Confirmed</p>

</div>

<div class="stat-card">

<h2 id="shippedCount">0</h2>

<p>Shipped</p>

</div>

<div class="stat-card">

<h2 id="deliveredCount">0</h2>

<p>Delivered</p>

</div>

<div class="stat-card revenue">

<h2 id="totalRevenue">

₹0

</h2>

<p>Total Revenue</p>

</div>

</div>

<!-- Table -->

<div class="table-card">

<table>

<thead>

<tr>

<th>Product</th>

<th>Customer</th>

<th>Total</th>

<th>Status</th>

<th>Payment</th>

<th>Date</th>

<th>Action</th>

</tr>

</thead>

<tbody id="ordersTable">

<tr>

<td colspan="7">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<script type="module"
src="assets/js/admin-orders.js"></script>

</body>

</html>
