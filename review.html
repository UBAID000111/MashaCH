<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Write Review | Masha Wear</title>

<link rel="stylesheet" href="assets/css/review.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="review-page">

<a href="orders.html" class="back-btn">

← Back to Orders

</a>

<div class="review-card">

<h1>Rate this Product</h1>

<p>Your review helps other customers.</p>

<div id="productInfo"></div>

<div class="stars">

<i class="fa-regular fa-star star" data-value="1"></i>

<i class="fa-regular fa-star star" data-value="2"></i>

<i class="fa-regular fa-star star" data-value="3"></i>

<i class="fa-regular fa-star star" data-value="4"></i>

<i class="fa-regular fa-star star" data-value="5"></i>

</div>

<input
id="reviewTitle"
type="text"
placeholder="Review Title">

<textarea
id="reviewText"
placeholder="Write your review..."
rows="6"></textarea>

<input
id="reviewImages"
type="file"
multiple
accept="image/*">

<button id="submitReview">

Submit Review

</button>

</div>

</div>

<script type="module" src="assets/js/review.js"></script>

</body>

</html>
